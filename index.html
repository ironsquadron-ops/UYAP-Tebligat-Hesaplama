<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TebligatSayaç Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background-color: #020617; color: #fff; font-family: sans-serif; padding: 20px; }
        .main { max-width: 600px; margin: auto; background: #0f172a; padding: 20px; border-radius: 12px; }
        #sonuc { margin-top: 20px; padding: 15px; border: 1px solid #22c55e; border-radius: 8px; }
    </style>
</head>
<body>
<div class="main">
    <h1>Tebligat Sayaç</h1>
    <input type="file" id="f" onchange="oku(this)">
    <div id="sonuc">Lütfen tebligat listesini seç...</div>
</div>

<script>
async function oku(inp) {
    let s = document.getElementById('sonuc');
    s.innerText = "Okunuyor, lütfen bekle...";
    
    try {
        const { data: { text } } = await Tesseract.recognize(inp.files[0], 'tur');
        let tarihler = text.match(/(\d{2})[\/\.-](\d{2})[\/\.-](\d{4})/g) || [];
        
        let adet = tarihler.length;
        let toplam = adet * 265;
        
        s.innerHTML = `Toplam okunan: ${adet} adet<br>Toplam Tutar: ${toplam} TL`;
    } catch (e) {
        s.innerHTML = "Hata oluştu. Chrome'da açmayı dene.";
    }
}
</script>
</body>
</html>
