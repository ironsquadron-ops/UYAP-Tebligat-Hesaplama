<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TebligatSayaç Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background-color: #020617; color: #fff; font-family: sans-serif; padding: 20px; }
        .main { max-width: 600px; margin: auto; background: #0f172a; padding: 20px; border-radius: 12px; }
        #sonuc { margin-top: 20px; padding: 15px; border: 1px solid #22c55e; border-radius: 8px; }
    </style>
</head>
<body>
<div class="main">
    <input type="file" id="f" onchange="oku(this)">
    <div id="sonuc">Lütfen tebligat listesini seç...</div>
</div>

<script>
async function oku(inp) {
    document.getElementById('sonuc').innerText = "Okunuyor, lütfen bekle...";
    // O(0) ve I(1) hatalarını engellemek için beyaz liste ve yüksek çözünürlük
    const { data: { text } } = await Tesseract.recognize(inp.files[0], 'tur', {
        tessedit_char_whitelist: '0123456789./- ',
        tessedit_pageseg_mode: 3 // Sayfanın tamamını analiz etmeye zorla
    });

    let temiz = text.replace(/o/gi, '0').replace(/l/gi, '1').replace(/I/gi, '1');
    let tarihler = temiz.match(/(\d{2})[\/\.-](\d{2})[\/\.-](\d{4})/g) || [];
    
    // YENİLEME: Eğer 13 tebligatın bazılarını kaçırıyorsa, 
    // metni satırlara bölüp her satırı tek tek tarihe çevirmeye çalışıyoruz
    let setTarihler = [...new Set(tarihler)]; // Aynı tarihleri tekilleştir
    
    document.getElementById('sonuc').innerHTML = 
        `Toplam okunan: ${tarihler.length} adet<br>` + 
        `Benzersiz Tarihler: ${setTarihler.join(', ')}`;
}
</script>
</body>
</html>
