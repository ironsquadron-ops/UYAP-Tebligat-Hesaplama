<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TebligatSayaç Pro v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: #f1f5f9; padding: 20px; overflow-x: hidden; user-select: none; }
        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .main-container { display: flex; gap: 20px; max-width: 1100px; margin: auto; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; border: 1px solid #1e293b; }
        .panel { background: rgba(30, 41, 59, 0.7); padding: 20px; border-radius: 12px; }
        .left-panel { flex: 2; }
        .right-panel { flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #334155; padding: 5px; text-align: center; font-size: 11px; }
        th { background: #0ea5e9; color: white; }
        .btn { cursor: pointer; padding: 10px; border-radius: 6px; border: none; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-analiz { background: #22c55e; color: white; }
        .btn-save { background: #3b82f6; color: white; }
        .input-text { width: 70px; background: #0f172a; color: white; border: 1px solid #334155; padding: 4px; text-align: center; }
        #dropZone { border: 2px dashed #0ea5e9; padding: 30px; text-align: center; cursor: pointer; border-radius: 8px; margin-bottom: 10px; color: #38bdf8; }
        #sonucAlani { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #22c55e; }
        .footer { margin-top: 20px; font-size: 12px; color: #94a3b8; text-align: center; border-top: 1px solid #334155; padding-top: 10px; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="main-container">
    <div class="panel left-panel">
        <h1>© UYAP OCR Tebligat Ücreti Hesaplama ©</h1>
        <div id="dropZone" onclick="document.getElementById('fotoSec').click()">
            Görseli Buraya Sürükle veya Tıkla
            <input type="file" id="fotoSec" style="display:none" onchange="gorselSecildi(this)">
        </div>
        <img id="onizleme" style="max-width:100%; display:none; border-radius:8px;">
        <button class="btn btn-analiz" onclick="analizEt()">ANALİZİ BAŞLAT VE HESAPLA</button>
        <div id="sonucAlani">Sonuç bekleniyor...</div>
        <div class="footer">
            <p>Geliştirici ve Hazırlayan: <b>Emre Yetkin KELEŞ</b></p>
            <p><a href="mailto:ab242319@adalet.gov.tr" style="color:#0ea5e9;">ab242319@adalet.gov.tr</a></p>
        </div>
    </div>

    <div class="panel right-panel">
        <h2>Tarife Yönetimi</h2>
        <table>
            <thead><tr><th>Başlangıç</th><th>Bitiş</th><th>Ücret</th><th>Devam?</th><th>X</th></tr></thead>
            <tbody id="tarifeTablo"></tbody>
        </table>
        <button class="btn" style="background:#64748b" onclick="yeniSatirEkle()">+ Yeni Satır</button>
        <button class="btn btn-save" onclick="kaydet()">Ayarları Kaydet</button>
    </div>
</div>

<script>
// --- ARKA PLAN ---
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = Array.from({length: 100}, () => ({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, v:Math.random()*0.5+0.1}));
function draw() {
    ctx.fillStyle = "#020617"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#38bdf8";
    particles.forEach(p => { p.y -= p.v; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); });
    requestAnimationFrame(draw);
}
draw();

// --- VERİ ---
let tarifeler = JSON.parse(localStorage.getItem('tarifeler')) || [
    {bas:"01.11.2019", bit:"31.12.2021", ucret:19, devam:false}, {bas:"02.11.2021", bit:"07.02.2022", ucret:26, devam:false},
    {bas:"08.02.2022", bit:"15.08.2022", ucret:31, devam:false}, {bas:"16.08.2022", bit:"31.01.2023", ucret:42, devam:false},
    {bas:"01.02.2023", bit:"30.07.2023", ucret:58, devam:false}, {bas:"31.07.2023", bit:"21.01.2024", ucret:87, devam:false},
    {bas:"22.01.2024", bit:"31.05.2024", ucret:120, devam:false}, {bas:"01.06.2024", bit:"09.02.2025", ucret:175, devam:false},
    {bas:"10.02.2025", bit:"03.02.2026", ucret:210, devam:false}, {bas:"04.02.2026", bit:"", ucret:265, devam:true}
];

function tabloyuGuncelle() {
    let tbody = document.getElementById('tarifeTablo');
    tbody.innerHTML = "";
    tarifeler.forEach((t, i) => {
        tbody.innerHTML += `<tr>
            <td><input class="input-text bas" value="${t.bas}"></td>
            <td><input class="input-text bit" value="${t.devam ? '' : t.bit}" ${t.devam ? 'disabled' : ''}></td>
            <td><input class="input-text ucr" value="${t.ucret}"></td>
            <td><input type="checkbox" onchange="tarifeler[${i}].devam=this.checked; tabloyuGuncelle()" ${t.devam ? 'checked' : ''}></td>
            <td><button onclick="tarifeler.splice(${i},1); tabloyuGuncelle()">X</button></td>
        </tr>`;
    });
}

function kaydet() {
    let baslar = document.querySelectorAll('.bas');
    let bitler = document.querySelectorAll('.bit');
    let ucretler = document.querySelectorAll('.ucr');
    let kutular = document.querySelectorAll('input[type="checkbox"]');
    tarifeler = [];
    for(let i=0; i<baslar.length; i++) {
        tarifeler.push({ bas: baslar[i].value, bit: bitler[i].value, ucret: parseFloat(ucretler[i].value), devam: kutular[i].checked });
    }
    localStorage.setItem('tarifeler', JSON.stringify(tarifeler));
    alert("Ayarlar kaydedildi!");
}

function yeniSatirEkle() { tarifeler.push({bas:"01.01.2027", bit:"", ucret:0, devam:false}); tabloyuGuncelle(); }

// --- ANALİZ ---
async function analizEt() {
    if(!window.tempImage) return alert("Lütfen önce görsel yükleyin!");
    document.getElementById('sonucAlani').innerHTML = "Analiz ediliyor...";
    
    const { data: { text } } = await Tesseract.recognize(window.tempImage, 'tur');
    let temizText = text.replace(/o/gi, '0').replace(/l/gi, '1').replace(/I/gi, '1');
    let tarihRegex = /(\d{2})[\/\.-](\d{2})[\/\.-](\d{4})/g;
    let tarihler = temizText.match(tarihRegex) || [];

    let toplam = 0, sayac = 0;
    tarihler.forEach(tStr => {
        let p = tStr.split(/[\/\.-]/);
        let d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
        let tarife = tarifeler.find(tr => {
            let b = tr.bas.split('.');
            let basTarih = new Date(parseInt(b[2]), parseInt(b[1])-1, parseInt(b[0]));
            if (tr.devam) return d >= basTarih;
            let bt = tr.bit.split('.');
            let bitTarih = new Date(parseInt(bt[2]), parseInt(bt[1]-1), parseInt(bt[0]));
            return d >= basTarih && d <= bitTarih;
        });
        if(tarife) { toplam += tarife.ucret; sayac++; console.log("Bulundu: " + tStr + " (" + tarife.ucret + " TL)"); }
    });

    document.getElementById('sonucAlani').innerHTML = `Bulunan Adet: <b>${sayac}</b><br>Toplam Tutar: <b>${toplam.toFixed(2)} TL</b>`;
}

function gorselSecildi(inp) {
    window.tempImage = inp.files[0];
    let reader = new FileReader();
    reader.onload = (e) => { document.getElementById('onizleme').src = e.target.result; document.getElementById('onizleme').style.display = 'block'; };
    reader.readAsDataURL(window.tempImage);
}
tabloyuGuncelle();
</script>
</body>
</html>
