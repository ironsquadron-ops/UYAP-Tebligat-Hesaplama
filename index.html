<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TebligatSayaç Pro v10.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #020617; color: #f1f5f9; padding: 15px; user-select: none; }
        .main-container { max-width: 600px; margin: auto; background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 16px; border: 1px solid #1e293b; }
        .btn { cursor: pointer; padding: 12px; border-radius: 8px; border: none; font-weight: bold; width: 100%; margin-top: 10px; color: white; }
        .btn-analiz { background: #22c55e; }
        .btn-save { background: #3b82f6; }
        #dropZone { border: 2px dashed #0ea5e9; padding: 20px; text-align: center; cursor: pointer; border-radius: 8px; color: #38bdf8; }
        #sonucAlani { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #22c55e; min-height: 50px; }
        input { width: 80%; padding: 5px; margin: 2px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>Tebligat OCR Hesaplama</h1>
    <div id="dropZone" onclick="document.getElementById('fotoSec').click()">
        Görseli Yükle veya Seç
        <input type="file" id="fotoSec" style="display:none" onchange="gorselSecildi(this)">
    </div>
    <img id="onizleme" style="max-width:100%; display:none; border-radius:8px; margin-top:10px;">
    <button class="btn btn-analiz" onclick="analizEt()">ANALİZİ BAŞLAT</button>
    <div id="sonucAlani">Sonuç bekleniyor...</div>

    <hr>
    <h3>Tarife Yönetimi</h3>
    <div id="tarifeTablo"></div>
    <button class="btn btn-save" onclick="kaydet()">Ayarları Kaydet</button>
</div>

<script>
let tarifeler = JSON.parse(localStorage.getItem('tarifeler')) || [
    {bas:"01.11.2019", bit:"31.12.2021", ucret:19, devam:false},
    {bas:"02.11.2021", bit:"07.02.2022", ucret:26, devam:false},
    {bas:"08.02.2022", bit:"15.08.2022", ucret:31, devam:false},
    {bas:"16.08.2022", bit:"31.01.2023", ucret:42, devam:false},
    {bas:"01.02.2023", bit:"30.07.2023", ucret:58, devam:false},
    {bas:"31.07.2023", bit:"21.01.2024", ucret:87, devam:false},
    {bas:"22.01.2024", bit:"31.05.2024", ucret:120, devam:false},
    {bas:"01.06.2024", bit:"09.02.2025", ucret:175, devam:false},
    {bas:"10.02.2025", bit:"03.02.2026", ucret:210, devam:false},
    {bas:"04.02.2026", bit:"", ucret:265, devam:true}
];

function tabloyuGuncelle() {
    let div = document.getElementById('tarifeTablo');
    div.innerHTML = tarifeler.map((t,i) => `<input value="${t.bas} - ${t.ucret} TL" disabled>`).join('<br>');
}

function kaydet() { alert("Ayarlar güncel."); }

async function analizEt() {
    if(!window.tempImage) return alert("Görsel seçin!");
    document.getElementById('sonucAlani').innerHTML = "Analiz ediliyor...";
    
    const { data: { text } } = await Tesseract.recognize(window.tempImage, 'tur');
    
    // OCR HATALARINI DÜZELT: 
    // 'o' yerine '0', 'l' veya 'I' yerine '1' koy. Noktaları koru.
    let temizText = text.replace(/o/gi, '0').replace(/l/gi, '1').replace(/I/gi, '1');
    
    // Tarih formatlarını yakala (Örn: 12.06.2026, 12/06/2026, 12-06-2026)
    let tarihRegex = /(\d{2})[\/\.\-\s](\d{2})[\/\.\-\s](\d{4})/g;
    let eslesmeler = [...temizText.matchAll(tarihRegex)];
    
    if (eslesmeler.length === 0) {
        document.getElementById('sonucAlani').innerHTML = "Tarih okunamadı. Fotoğrafı çok net çekin.<br>Okunan ham veri: " + temizText.substring(0, 50);
        return;
    }

    let toplam = 0, sayac = 0;
    eslesmeler.forEach(m => {
        let d = new Date(m[3], m[2]-1, m[1]);
        let tarife = tarifeler.find(tr => {
            let b = tr.bas.split('.');
            let bas = new Date(b[2], b[1]-1, b[0]);
            if(tr.devam) return d >= bas;
            let bt = tr.bit.split('.');
            let bit = new Date(bt[2], bt[1]-1, bt[0]);
            return d >= bas && d <= bit;
        });
        if(tarife) { toplam += tarife.ucret; sayac++; }
    });

    document.getElementById('sonucAlani').innerHTML = `Bulunan Adet: ${sayac}<br>Toplam Tutar: <b>${toplam} TL</b>`;
}

function gorselSecildi(inp) {
    window.tempImage = inp.files[0];
    let reader = new FileReader();
    reader.onload = (e) => { document.getElementById('onizleme').src = e.target.result; document.getElementById('onizleme').style.display = 'block'; };
    reader.readAsDataURL(window.tempImage);
}

tabloyuGuncelle();
</script>
</body>
</html>
