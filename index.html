<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TebligatSayaç Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* Senin orijinal tasarımındaki karanlık tema */
        body {
            background-color: #030712; 
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 80px;
            margin: 0;
        }

        /* Ortadaki ana kutu */
        .container {
            background-color: #0f172a; 
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
        }

        /* Başlık */
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* Dosya seçme alanı */
        input[type="file"] {
            margin-bottom: 20px;
            display: block;
            width: 100%;
        }

        /* Orijinal tasarımındaki yeşil çerçeveli sonuç kutusu */
        .result-box {
            border: 1px solid #059669; 
            padding: 15px;
            border-radius: 6px;
            background-color: transparent;
            color: #e2e8f0;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tebligat Sayaç</h1>
    <input type="file" id="dosya" accept="image/*" onchange="analizEt(this)">
    <div class="result-box" id="sonuc">Lütfen tebligat listesini seç...</div>
</div>

<script>
async function analizEt(input) {
    let sonucDiv = document.getElementById('sonuc');
    
    // Dosya seçilmediyse işlem yapma
    if (!input.files || input.files.length === 0) return;
    
    sonucDiv.innerText = "Okunuyor, lütfen bekle...";
    
    try {
        // OCR Motorunu Başlat
        const { data: { text } } = await Tesseract.recognize(input.files[0], 'tur');
        
        // Karışan harfleri rakama çevir ve tarihleri bul
        let temiz = text.replace(/o/gi, '0').replace(/l/gi, '1').replace(/I/gi, '1');
        let tarihler = temiz.match(/(\d{2})[\/\.-](\d{2})[\/\.-](\d{4})/g) || [];
        
        // Hesaplama (Güncel tarife 265 TL)
        let adet = tarihler.length;
        let toplam = adet * 265;
        
        // Sonucu Ekrana Yazdır
        sonucDiv.innerHTML = `Toplam okunan: <b>${adet} adet</b><br><br>Toplam Tutar: <b>${toplam} TL</b>`;
        
    } catch (e) {
        sonucDiv.innerHTML = "Hata: APK izinleri kapalı veya motor başlatılamadı. Chrome'da açmayı dene.";
    }
}
</script>
</body>
</html>
